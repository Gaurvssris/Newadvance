# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  name: Devopsadvanceagent

variables:
  terraformVersion: '1.10.5'

stages:

#===========================
# DEV
#===========================
- stage: DEV
  displayName: "Terraform DEV"

  jobs:
  - job: DEV
    displayName: "Terraform DEV"

    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(System.DefaultWorkingDirectory)/Root/Dev
        backendServiceArm: Devopsadvancesc
        backendAzureRmStorageAccountName: devsecopsstrg
        backendAzureRmContainerName: devsecopcont
        backendAzureRmKey: dev.tfstate

    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: azurerm
        command: validate
        workingDirectory: $(System.DefaultWorkingDirectory)/Root/Dev

    - powershell: |
        $ErrorActionPreference = "Stop"
        $tflintVersion = (Invoke-RestMethod -Uri "https://api.github.com/repos/terraform-linters/tflint/releases/latest").tag_name
        $url = "https://github.com/terraform-linters/tflint/releases/download/$tflintVersion/tflint_windows_amd64.zip"
        $zipPath = "$(Agent.TempDirectory)\tflint.zip"
        $installDir = "$(Agent.TempDirectory)\tflint"
        New-Item -ItemType Directory -Path $installDir -Force | Out-Null
        Invoke-WebRequest -Uri $url -OutFile $zipPath
        Expand-Archive -Path $zipPath -DestinationPath $installDir -Force
        Write-Host "##vso[task.prependpath]$installDir"
      displayName: Install TFLint

    - powershell: |
        tflint --init
        cd "$(System.DefaultWorkingDirectory)/Root/Dev"
        tflint
      displayName: Run TFLint

    - powershell: |
        $ErrorActionPreference = "Stop"
        $tfsecVersion = (Invoke-RestMethod -Uri "https://api.github.com/repos/aquasecurity/tfsec/releases/latest").tag_name
        $installDir = "$(Agent.TempDirectory)\tfsec"
        New-Item -ItemType Directory -Path $installDir -Force | Out-Null
        Invoke-WebRequest -Uri "https://github.com/aquasecurity/tfsec/releases/download/$tfsecVersion/tfsec-windows-amd64.exe" -OutFile "$installDir\tfsec.exe"
        Write-Host "##vso[task.prependpath]$installDir"
      displayName: Install TFSec

    - powershell: |
        cd "$(System.DefaultWorkingDirectory)/Root/Dev"
        tfsec .
      displayName: Run TFSec
    
    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(System.DefaultWorkingDirectory)/Root/Dev
    
    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: azurerm
        command: apply
        workingDirectory: $(System.DefaultWorkingDirectory)/Root/Dev    



      
