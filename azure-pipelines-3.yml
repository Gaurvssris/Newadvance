# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  naae: Devopsadvanceagent

steps:
- task: TerraformTask@5
  displayName: Terraform init
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Root/Prod'
    backendServiceArm: 'Devopsadvancesc'
    backendAzureRmStorageAccountName: 'devsecopsstrg'
    backendAzureRmContainerName: 'devsecopcont'
    backendAzureRmKey: 'backup.tfstate'
